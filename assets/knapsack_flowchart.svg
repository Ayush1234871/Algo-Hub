<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 850" width="100%" height="100%">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#8a2be2" />
        </marker>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2a2a35;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1a25;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#grad1)" rx="15" />
    
    <g transform="translate(300, 50)" text-anchor="middle" font-family="Arial, sans-serif" fill="#ffffff">
        <rect x="-100" y="0" width="200" height="40" rx="20" fill="#8a2be2" />
        <text x="0" y="25" font-weight="bold">Start</text>
        
        <path d="M0,40 L0,80" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />
        
        <rect x="-140" y="80" width="280" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="110">Create 2D Array K[n+1][W+1]</text>

        <path d="M0,130 L0,170" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <rect x="-140" y="170" width="280" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="200">Outer Loop: i from 0 to n</text>
        
        <path d="M0,220 L0,260" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <rect x="-140" y="260" width="280" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="290">Inner Loop: w from 0 to W</text>
        
        <path d="M0,310 L0,350" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <polygon points="0,350 140,400 0,450 -140,400" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="405">i == 0 OR w == 0?</text>
        
        <path d="M140,400 L240,400 L240,480" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="190" y="390" fill="#00ffcc">Yes</text>
        
        <rect x="180" y="480" width="100" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="230" y="510">K[i][w] = 0</text>

        <path d="M-140,400 L-220,400 L-220,480" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="-180" y="390" fill="#ff4444">No</text>
        
        <polygon points="-220,480 -120,530 -220,580 -320,530" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="-220" y="535">wt[i-1] &lt;= w?</text>

        <path d="M-120,530 L-60,530 L-60,600" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="-90" y="520" fill="#00ffcc">Yes</text>
        
        <rect x="-160" y="600" width="200" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="-60" y="630">K[i][w] = max(val+.., K..)</text>

        <path d="M-320,530 L-360,530 L-360,600" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="-340" y="520" fill="#ff4444">No</text>
        
        <rect x="-420" y="600" width="120" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="-360" y="630">K[i][w] = K[i-1][w]</text>

        <path d="M-360,650 L-360,680 L0,680" stroke="#8a2be2" stroke-width="2" fill="none"/>
        <path d="M-60,650 L-60,680 L0,680" stroke="#8a2be2" stroke-width="2" fill="none"/>
        <path d="M230,530 L230,680 L0,680" stroke="#8a2be2" stroke-width="2" fill="none"/>
        
        <path d="M0,680 L0,710" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />
        
        <rect x="-100" y="710" width="200" height="40" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="735">Return K[n][W]</text>

        <path d="M0,750 L0,780" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <rect x="-100" y="780" width="200" height="40" rx="20" fill="#8a2be2" />
        <text x="0" y="805" font-weight="bold">End</text>
    </g>
</svg>
