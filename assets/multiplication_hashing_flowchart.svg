<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Glow -->
  <circle cx="300" cy="200" r="150" fill="url(#paint0_radial)" fill-opacity="0.2"/>
  
  <!-- Nodes -->
  <rect x="225" y="40" width="150" height="50" rx="10" fill="#1A1A1E" stroke="#00FF9F" stroke-width="2"/>
  <text x="300" y="72" fill="white" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Input Key k</text>
  
  <path d="M300 90V130" stroke="#00FF9F" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="180" y="130" width="240" height="60" rx="10" fill="#1A1A1E" stroke="#FF00FF" stroke-width="2"/>
  <text x="300" y="165" fill="white" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">Multiply: k × A (0 &lt; A &lt; 1)</text>
  
  <path d="M300 190V230" stroke="#FF00FF" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="180" y="230" width="240" height="60" rx="10" fill="#1A1A1E" stroke="#00D2FF" stroke-width="2"/>
  <text x="300" y="265" fill="white" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">Extract Fractional Part</text>
  
  <path d="M300 290V330" stroke="#00D2FF" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="200" y="330" width="200" height="50" rx="10" fill="#1A1A1E" stroke="#FFD700" stroke-width="2"/>
  <text x="300" y="362" fill="white" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Hash: ⌊m × frac⌋</text>

  <!-- Definitions -->
  <defs>
    <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 200) rotate(90) scale(150)">
      <stop stop-color="#00FF9F"/>
      <stop offset="1" stop-color="#1A1A1E" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00FF9F" />
    </marker>
  </defs>
</svg>
