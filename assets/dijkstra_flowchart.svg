<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="100%" height="100%">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#8a2be2" />
        </marker>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2a2a35;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1a25;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#grad1)" rx="15" />
    
    <g transform="translate(300, 50)" text-anchor="middle" font-family="Arial, sans-serif" fill="#ffffff">
        <rect x="-100" y="0" width="200" height="40" rx="20" fill="#8a2be2" />
        <text x="0" y="25" font-weight="bold">Start</text>
        
        <path d="M0,40 L0,80" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />
        
        <rect x="-140" y="80" width="280" height="70" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="105">Set dist[source] = 0</text>
        <text x="0" y="125">Set dist[all other] = Infinity</text>
        <text x="0" y="145">Create Min Priority Queue Q</text>

        <path d="M0,150 L0,190" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <polygon points="0,190 120,240 0,290 -120,240" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="245">Is Q Empty?</text>
        
        <path d="M0,290 L0,330" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="15" y="310" fill="#ff4444">No</text>
        
        <rect x="-120" y="330" width="240" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="360">u = extract node with min dist</text>
        
        <path d="M0,380 L0,420" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />
        
        <rect x="-160" y="420" width="320" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="450">For each neighbor v of u:</text>

        <path d="M0,470 L0,510" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <polygon points="0,510 140,560 0,610 -140,560" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="555">dist[v] > dist[u] + weight?</text>
        
        <path d="M0,610 L0,650" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="15" y="630" fill="#00ffcc">Yes</text>
        
        <rect x="-120" y="650" width="240" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="680">dist[v] = dist[u] + weight</text>

        <path d="M0,700 L0,730 L220,730 L220,445 L160,445" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

        <path d="M-140,560 L-220,560 L-220,445 L-160,445" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="-180" y="550" fill="#ff4444">No</text>
        
        <path d="M120,240 L260,240 L260,780 L0,780" stroke="#8a2be2" stroke-width="2" fill="none"/>
        <text x="150" y="230" fill="#00ffcc">Yes</text>

        <rect x="-100" y="760" width="200" height="40" rx="20" fill="#8a2be2" />
        <text x="0" y="785" font-weight="bold">End</text>
    </g>
</svg>
