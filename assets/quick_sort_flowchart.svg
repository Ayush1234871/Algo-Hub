<svg width="600" height="700" viewBox="0 0 600 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="700" rx="20" fill="#0D0D0F"/>
  <circle cx="300" cy="350" r="200" fill="url(#paint4_radial)" fill-opacity="0.1"/>
  <rect x="200" y="40" width="200" height="50" rx="10" fill="#1A1A1E" stroke="#FFD700" stroke-width="2"/>
  <text x="300" y="72" fill="white" font-family="Inter" font-size="14" text-anchor="middle" font-weight="bold">Start QuickSort(low, high)</text>
  <path d="M300 90V130" stroke="#FFD700" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M300 130L380 170L300 210L220 170L300 130Z" fill="#1A1A1E" stroke="#00D2FF" stroke-width="2"/>
  <text x="300" y="175" fill="white" font-family="Inter" font-size="12" text-anchor="middle">low &lt; high?</text>
  <path d="M380 170H450V230" stroke="#00FF9F" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="410" y="160" fill="#00FF9F" font-family="Inter" font-size="12">Yes</text>
  <rect x="350" y="230" width="200" height="60" rx="10" fill="#1A1A1E" stroke="#00FF9F" stroke-width="2"/>
  <text x="450" y="265" fill="white" font-family="Inter" font-size="14" text-anchor="middle">Partition: pi = Partition(arr)</text>
  <path d="M450 290V330" stroke="#00FF9F" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="350" y="330" width="200" height="60" rx="10" fill="#1A1A1E" stroke="#FF00FF" stroke-width="2"/>
  <text x="450" y="365" fill="white" font-family="Inter" font-size="14" text-anchor="middle">QuickSort(low, pi-1)</text>
  <path d="M450 390V430" stroke="#FF00FF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="350" y="430" width="200" height="60" rx="10" fill="#1A1A1E" stroke="#FF4D4D" stroke-width="2"/>
  <text x="450" y="465" fill="white" font-family="Inter" font-size="14" text-anchor="middle">QuickSort(pi+1, high)</text>
  <path d="M220 170H150V510H300" stroke="#FF4D4D" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="170" y="160" fill="#FF4D4D" font-family="Inter" font-size="12">No</text>
  <path d="M450 490V530H300" stroke="#FF4D4D" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <rect x="225" y="530" width="150" height="50" rx="10" fill="#1A1A1E" stroke="#8A2BE2" stroke-width="2"/>
  <text x="300" y="562" fill="white" font-family="Inter" font-size="14" text-anchor="middle" font-weight="bold">Done</text>
  <defs>
    <radialGradient id="paint4_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 350) rotate(90) scale(200)">
      <stop stop-color="#FFD700"/><stop offset="1" stop-color="#0D0D0F" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FFD700" /></marker>
  </defs>
</svg>
