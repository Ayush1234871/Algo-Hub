<svg width="600" height="700" viewBox="0 0 600 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="700" rx="20" fill="#0D0D0F"/>
  <circle cx="300" cy="350" r="200" fill="url(#paint5_radial)" fill-opacity="0.1"/>
  <rect x="225" y="40" width="150" height="50" rx="10" fill="#1A1A1E" stroke="#8A2BE2" stroke-width="2"/>
  <text x="300" y="72" fill="white" font-family="Inter" font-size="14" text-anchor="middle" font-weight="bold">Start HeapSort</text>
  <path d="M300 90V130" stroke="#8A2BE2" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="180" y="130" width="240" height="60" rx="10" fill="#1A1A1E" stroke="#00D2FF" stroke-width="2"/>
  <text x="300" y="165" fill="white" font-family="Inter" font-size="14" text-anchor="middle">Build Max Heap from arr</text>
  <path d="M300 190V230" stroke="#00D2FF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="150" y="230" width="300" height="60" rx="10" fill="#1A1A1E" stroke="#FF00FF" stroke-width="2"/>
  <text x="300" y="265" fill="white" font-family="Inter" font-size="14" text-anchor="middle">Swap root with last element</text>
  <path d="M300 290V330" stroke="#FF00FF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="180" y="330" width="240" height="60" rx="10" fill="#1A1A1E" stroke="#FF4D4D" stroke-width="2"/>
  <text x="300" y="365" fill="white" font-family="Inter" font-size="14" text-anchor="middle">Reduce heap size by 1</text>
  <path d="M300 390V430" stroke="#FF4D4D" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="180" y="430" width="240" height="60" rx="10" fill="#1A1A1E" stroke="#00FF9F" stroke-width="2"/>
  <text x="300" y="465" fill="white" font-family="Inter" font-size="14" text-anchor="middle">Heapify(root)</text>
  <path d="M420 460H480V260H450" stroke="#00FF9F" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="490" y="360" fill="#00FF9F" font-family="Inter" font-size="12">Loop</text>
  <path d="M300 490V530" stroke="#00FF9F" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="225" y="530" width="150" height="50" rx="10" fill="#1A1A1E" stroke="#FFD700" stroke-width="2"/>
  <text x="300" y="562" fill="white" font-family="Inter" font-size="14" text-anchor="middle" font-weight="bold">Sorted Array</text>
  <defs>
    <radialGradient id="paint5_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 350) rotate(90) scale(200)">
      <stop stop-color="#8A2BE2"/><stop offset="1" stop-color="#0D0D0F" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8A2BE2" /></marker>
  </defs>
</svg>
