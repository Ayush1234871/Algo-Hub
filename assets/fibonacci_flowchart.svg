<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="100%" height="100%">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#8a2be2" />
        </marker>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2a2a35;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1a25;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#grad1)" rx="15" />
    
    <g transform="translate(300, 50)" text-anchor="middle" font-family="Arial, sans-serif" fill="#ffffff">
        <rect x="-100" y="0" width="200" height="40" rx="20" fill="#8a2be2" />
        <text x="0" y="25" font-weight="bold">Start</text>
        
        <path d="M0,40 L0,80" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />
        
        <polygon points="0,80 120,130 0,180 -120,130" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="135">Is n &lt;= 1?</text>
        
        <path d="M120,130 L200,130 L200,680 L100,680" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="150" y="120" fill="#00ffcc">Yes</text>
        <text x="220" y="400">Return n</text>
        
        <path d="M0,180 L0,220" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="15" y="200" fill="#ff4444">No</text>
        
        <rect x="-140" y="220" width="280" height="70" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="245">Create Array dp[n+1]</text>
        <text x="0" y="265">dp[0] = 0</text>
        <text x="0" y="285">dp[1] = 1</text>

        <path d="M0,290 L0,330" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <rect x="-100" y="330" width="200" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="360">Loop i from 2 to n</text>
        
        <path d="M0,380 L0,420" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <rect x="-120" y="420" width="240" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="450">dp[i] = dp[i-1] + dp[i-2]</text>
        
        <path d="M0,470 L0,510" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />
        
        <polygon points="0,510 100,540 0,570 -100,540" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="545">End of Loop?</text>
        
        <path d="M100,540 L180,540 L180,355 L100,355" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="130" y="530" fill="#ff4444">No</text>

        <path d="M0,570 L0,610" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />
        <text x="20" y="595" fill="#00ffcc">Yes</text>

        <rect x="-100" y="610" width="200" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="640">Return dp[n]</text>

        <path d="M0,660 L0,700" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <rect x="-100" y="700" width="200" height="40" rx="20" fill="#8a2be2" />
        <text x="0" y="725" font-weight="bold">End</text>
    </g>
</svg>
