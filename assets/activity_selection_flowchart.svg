<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="100%" height="100%">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#8a2be2" />
        </marker>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2a2a35;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1a25;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#grad1)" rx="15" />
    
    <g transform="translate(300, 50)" text-anchor="middle" font-family="Arial, sans-serif" fill="#ffffff">
        <rect x="-100" y="0" width="200" height="40" rx="20" fill="#8a2be2" />
        <text x="0" y="25" font-weight="bold">Start</text>
        
        <path d="M0,40 L0,80" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />
        
        <rect x="-120" y="80" width="240" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="110">Sort activities by finish time</text>

        <path d="M0,130 L0,170" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <rect x="-140" y="170" width="280" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="200">Select first activity A[0], set i=0</text>
        
        <path d="M0,220 L0,260" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <rect x="-80" y="260" width="160" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="290">Loop j from 1 to n-1</text>
        
        <path d="M0,310 L0,350" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <polygon points="0,350 120,400 0,450 -120,400" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="405">Start[j] >= Finish[i]?</text>
        
        <path d="M120,400 L180,400 L180,480" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="150" y="390" fill="#00ffcc">Yes</text>
        
        <rect x="100" y="480" width="160" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="180" y="500">Select A[j]</text>
        <text x="180" y="520">i = j</text>

        <path d="M-120,400 L-180,400 L-180,560 L-80,560" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="-150" y="390" fill="#ff4444">No</text>
        
        <path d="M180,530 L180,560 L-80,560" stroke="#8a2be2" stroke-width="2" fill="none"/>
        
        <path d="M0,560 L0,600" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />
        
        <polygon points="0,600 100,630 0,660 -100,630" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="635">End of Loop?</text>
        
        <path d="M100,630 L260,630 L260,285 L80,285" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="130" y="620" fill="#ff4444">No</text>

        <path d="M0,660 L0,700" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />
        <text x="20" y="685" fill="#00ffcc">Yes</text>

        <rect x="-100" y="700" width="200" height="40" rx="20" fill="#8a2be2" />
        <text x="0" y="725" font-weight="bold">End</text>
    </g>
</svg>
