<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 850" width="100%" height="100%">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#8a2be2" />
        </marker>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2a2a35;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1a25;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#grad1)" rx="15" />
    
    <g transform="translate(300, 50)" text-anchor="middle" font-family="Arial, sans-serif" fill="#ffffff">
        <rect x="-100" y="0" width="200" height="40" rx="20" fill="#8a2be2" />
        <text x="0" y="25" font-weight="bold">Start DFS(u)</text>
        
        <path d="M0,40 L0,80" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />
        
        <rect x="-140" y="80" width="280" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="110">Mark 'u' as visited &amp; Print 'u'</text>

        <path d="M0,130 L0,170" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <rect x="-160" y="170" width="320" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="200">For each neighbor 'v' of 'u':</text>
        
        <path d="M0,220 L0,260" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <polygon points="0,260 140,310 0,360 -140,310" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="315">Is 'v' visited?</text>
        
        <path d="M-140,310 L-200,310 L-200,380" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="-170" y="300" fill="#ff4444">No</text>
        
        <rect x="-260" y="380" width="160" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="-180" y="410">Recursively call DFS(v)</text>

        <path d="M140,310 L220,310 L220,460 L0,460" stroke="#8a2be2" stroke-width="2" fill="none"/>
        <text x="180" y="300" fill="#00ffcc">Yes</text>
        
        <path d="M-180,430 L-180,460 L0,460" stroke="#8a2be2" stroke-width="2" fill="none"/>
        
        <path d="M0,460 L0,490" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

        <polygon points="0,490 100,520 0,550 -100,520" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="525">More neighbors?</text>

        <path d="M100,520 L260,520 L260,195 L160,195" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="130" y="510" fill="#00ffcc">Yes</text>

        <path d="M0,550 L0,590" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="20" y="570" fill="#ff4444">No</text>

        <rect x="-100" y="590" width="200" height="40" rx="20" fill="#8a2be2" />
        <text x="0" y="615" font-weight="bold">Return</text>
    </g>
</svg>
