<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 850" width="100%" height="100%">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#8a2be2" />
        </marker>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2a2a35;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1a25;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#grad1)" rx="15" />
    
    <g transform="translate(300, 50)" text-anchor="middle" font-family="Arial, sans-serif" fill="#ffffff">
        <rect x="-100" y="0" width="200" height="40" rx="20" fill="#8a2be2" />
        <text x="0" y="25" font-weight="bold">Start</text>
        
        <path d="M0,40 L0,80" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />
        
        <rect x="-140" y="80" width="280" height="70" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="105">Initialize dist array to Infinity</text>
        <text x="0" y="125">Set dist[source] = 0</text>
        <text x="0" y="145">Loop i from 1 to V-1</text>

        <path d="M0,150 L0,190" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <rect x="-140" y="190" width="280" height="40" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="215">For each edge (u, v, weight):</text>
        
        <path d="M0,230 L0,270" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <polygon points="0,270 140,320 0,370 -140,320" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="325">dist[u] + weight &lt; dist[v]?</text>
        
        <path d="M0,370 L0,410" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="15" y="390" fill="#00ffcc">Yes</text>
        
        <rect x="-120" y="410" width="240" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="0" y="440">dist[v] = dist[u] + weight</text>

        <path d="M-140,320 L-220,320 L-220,480" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="-180" y="310" fill="#ff4444">No</text>
        
        <path d="M0,460 L0,480" stroke="#8a2be2" stroke-width="2" fill="none"/>
        <path d="M0,480 L-220,480" stroke="#8a2be2" stroke-width="2" fill="none"/>
        
        <path d="M-110,480 L-110,510" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

        <polygon points="-110,510 -10,540 -110,570 -210,540" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="-110" y="545">More edges?</text>

        <path d="M-10,540 L160,540 L160,210 L140,210" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="70" y="530" fill="#00ffcc">Yes</text>

        <path d="M-110,570 L-110,600" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="-90" y="590" fill="#ff4444">No</text>

        <rect x="-210" y="600" width="200" height="50" rx="5" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="-110" y="630">Check for negative cycles</text>

        <path d="M-110,650 L-110,680" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" />

        <polygon points="-110,680 10,720 -110,760 -230,720" fill="#3a3a45" stroke="#8a2be2" stroke-width="2"/>
        <text x="-110" y="725">Any dist[u]+w &lt; dist[v]?</text>

        <path d="M10,720 L100,720 L100,800" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="50" y="710" fill="#00ffcc">Yes</text>
        <text x="100" y="820">Error: Negative Cycle</text>

        <path d="M-110,760 L-110,800" stroke="#8a2be2" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <text x="-90" y="780" fill="#ff4444">No</text>

        <rect x="-160" y="800" width="100" height="40" rx="20" fill="#8a2be2" />
        <text x="-110" y="825" font-weight="bold">End</text>
    </g>
</svg>
