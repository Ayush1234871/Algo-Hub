<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Algo Hub</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .contact-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 4rem;
            padding: 80px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 20px;
            transition: var(--transition);
        }
        .info-card:hover { border-color: var(--primary); }
        
        .contact-form {
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .form-group {
            margin-bottom: 2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            transition: var(--transition);
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }
        .submit-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);
        }
        .submit-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <a href="../index.html"><img src="../assets/logo.png" alt="Algo Hub Logo"></a>
    </div>
    <nav class="navbar">

        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="aboutus.html">About</a></li>
            <li><a href="service.html">Services</a></li>
            <li><a href="contactus.html">Contact Us</a></li>
        </ul>
    </nav>

    <main class="content">
        <h1 class="welcome-text">Get In Touch</h1>
        
        <div class="contact-container">
            <div class="contact-info">
                <h2>Contact Information</h2>
                <div class="info-card">
                    <h3>📍 Address</h3>
                    <p style="color: var(--text-muted); margin-top: 0.5rem;">Global Tech Park, Bangalore, India</p>
                </div>
                <div class="info-card">
                    <h3>📧 Email</h3>
                    <p style="color: var(--text-muted); margin-top: 0.5rem;">support@algohub.com</p>
                </div>
                <div class="info-card">
                    <h3>📱 Phone</h3>
                    <p style="color: var(--text-muted); margin-top: 0.5rem;">+91 98765 43210</p>
                </div>
            </div>

            <form class="contact-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="How can we help you?"></textarea>
                </div>
                <button type="submit" class="submit-btn" onclick="alert('Message sent successfully!'); return false;">Send Message</button>
            </form>
        </div>
    </main>

    <footer style="padding: 40px 5%; border-top: 1px solid var(--glass-border); text-align: center; margin-top: 4rem;">
        <p>&copy; 2024 Algo Hub. Making Algorithms Simple.</p>
    </footer>
</body>
</html>
